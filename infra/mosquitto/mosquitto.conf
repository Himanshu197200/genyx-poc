# ── Mosquitto v2 config ──────────────────────────────────────────────────────

# Disable plain unauthenticated listener
listener 1883
allow_anonymous false

# TLS MQTT listener (8883)
listener 8883
allow_anonymous false
cafile  /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false

# WSS listener (8884) for mobile / browser clients
listener 8884
protocol websockets
allow_anonymous false
cafile  /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Persistence
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

# go-auth plugin
plugin /mosquitto/go-auth.so
include_dir /mosquitto/conf.d

# ── mosquitto-go-auth : JWT/JWKS mode ────────────────────────────────────────
auth_opt_backends    jwt
auth_opt_jwt_mode    remote
auth_opt_jwt_remote_mode    jwks
auth_opt_jwt_jwks_url       http://backend:4000/.well-known/jwks.json
auth_opt_jwt_jwks_cache_seconds 300
auth_opt_jwt_aud            mqtt
auth_opt_jwt_user_field     sub
auth_opt_jwt_scope_field    scope

# ── ACL patterns by scope ─────────────────────────────────────────────────────
# scope=user  → read sessions topics, write commands only
auth_opt_acl_pattern_user   read  genyx/s/+/keypoints
auth_opt_acl_pattern_user   read  genyx/s/+/rep_events
auth_opt_acl_pattern_user   read  genyx/s/+/state
auth_opt_acl_pattern_user   read  genyx/s/+/summary
auth_opt_acl_pattern_user   write genyx/s/+/commands

# scope=edge  → publish session data, read commands
auth_opt_acl_pattern_edge   write genyx/s/+/keypoints
auth_opt_acl_pattern_edge   write genyx/s/+/rep_events
auth_opt_acl_pattern_edge   write genyx/s/+/state
auth_opt_acl_pattern_edge   read  genyx/s/+/commands
auth_opt_acl_pattern_edge   write genyx/sys/health/+
